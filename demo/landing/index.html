<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <!-- highlight.js CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    
    <style>
        :root {
            /* Color Palette */
            --bg-page: #f0f4ff;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --accent-blue: #2563eb;
            --accent-blue-hover: #1d4ed8;
            --accent-green: #10b981;
            --danger-red: #ef4444;
            --border-color: #e2e8f0;
            --bg-code: #0f172a;
            --text-code: #e2e8f0;

            /* Shadows */
            --shadow-card: 0 4px 6px rgba(0,0,0,0.04), 0 12px 40px rgba(0,0,0,0.06);
            --shadow-btn: 0 2px 8px rgba(37,99,235,0.3);
            --shadow-floating: 0 20px 60px rgba(0,0,0,0.12);
            --shadow-nav: 0 4px 20px rgba(0,0,0,0.03);

            /* Typography */
            --font-main: 'Inter', sans-serif;
            --font-code: 'JetBrains Mono', Consolas, monospace;
        }

        /* Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-main);
            color: var(--text-primary);
            background-color: var(--bg-page);
            font-size: 16px;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        /* Typography */
        h1, h2, h3 { color: var(--text-primary); }
        h1 { font-size: 64px; font-weight: 700; line-height: 1.1; letter-spacing: -2px; }
        h2 { font-size: 40px; font-weight: 700; line-height: 1.2; letter-spacing: -1px; }
        h3 { font-size: 24px; font-weight: 600; line-height: 1.3; }
        p { color: var(--text-secondary); margin-bottom: 16px; }
        
        code { font-family: var(--font-code); font-size: 14px; }

        /* Layout & Spacing */
        section { padding: 120px 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        
        .text-center { text-align: center; }
        
        /* Buttons */
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 12px 24px; border-radius: 8px; font-weight: 600; font-size: 15px;
            text-decoration: none; transition: all 0.2s ease; cursor: pointer;
            border: none; gap: 8px;
        }
        .btn-primary { background-color: var(--accent-blue); color: #fff; box-shadow: var(--shadow-btn); }
        .btn-primary:hover { background-color: var(--accent-blue-hover); transform: translateY(-1px); }
        .btn-secondary { background-color: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border-color); }
        .btn-secondary:hover { background-color: #f8fafc; }

        /* Navigation */
        nav {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px); border-bottom: 1px solid var(--border-color);
            transition: box-shadow 0.3s ease;
        }
        nav.scrolled { box-shadow: var(--shadow-nav); }
        
        .nav-container {
            max-width: 1200px; margin: 0 auto; padding: 0 24px; height: 72px;
            display: flex; align-items: center; justify-content: space-between;
        }
        
        .nav-left .logo {
            display: flex; align-items: center; gap: 8px; text-decoration: none;
            font-weight: 700; color: var(--text-primary); font-size: 18px;
        }
        .logo svg { color: var(--accent-blue); }
        
        .nav-center { display: flex; gap: 32px; }
        .nav-center a {
            text-decoration: none; color: var(--text-secondary); font-size: 14px; font-weight: 500; transition: color 0.2s;
        }
        .nav-center a:hover { color: var(--text-primary); }
        
        .nav-right { display: flex; align-items: center; gap: 24px; }
        .nav-link { text-decoration: none; color: var(--text-secondary); font-size: 14px; font-weight: 500; }
        .nav-link:hover { color: var(--text-primary); }
        
        .hamburger { display: none; background: none; border: none; cursor: pointer; flex-direction: column; gap: 5px; }
        .hamburger span { display: block; width: 24px; height: 2px; background-color: var(--text-primary); transition: 0.3s; }

        /* Animation Classes */
        .animate-on-scroll { opacity: 0; transform: translateY(30px); transition: opacity 0.6s ease-out, transform 0.6s ease-out; }
        .animate-on-scroll.visible { opacity: 1; transform: translateY(0); }
        .delay-1 { transition-delay: 0.1s; }
        .delay-2 { transition-delay: 0.2s; }
        .delay-3 { transition-delay: 0.3s; }

        @media (max-width: 768px) {
            h1 { font-size: 40px; }
            h2 { font-size: 32px; }
            section { padding: 80px 0; }
            .nav-center { display: none; /* simple collapse for mobile */ }
            .nav-right .nav-link { display: none; }
            .hamburger { display: flex; }
        }
    </style>
</head>
